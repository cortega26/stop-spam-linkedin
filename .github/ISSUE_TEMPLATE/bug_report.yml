name: Bug report
description: Report something broken in the extension.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve LinkedIn Spam Blocker.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the issue and what you expected instead.
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Edge
        - Other Chromium-based browser
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: "1.1.0"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to LinkedIn...
        2. Open...
        3. See...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Screenshots are helpful if they do not include private data.

