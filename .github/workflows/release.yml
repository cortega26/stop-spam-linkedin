name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: Package extension
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke check
        run: npm run smoke

      - name: Package extension
        run: npm run package

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: extension-zip
          path: dist/linkedin-spam-blocker-*.zip
          if-no-files-found: error

  chrome:
    name: Submit to Chrome Web Store
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: extension-zip
          path: dist

      - name: Submit to Chrome Web Store
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: npm run submit:chrome

  firefox:
    name: Submit to Mozilla Add-ons
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: extension-zip
          path: dist

      - name: Submit to Mozilla Add-ons
        env:
          FIREFOX_API_KEY: ${{ secrets.FIREFOX_API_KEY }}
          FIREFOX_API_SECRET: ${{ secrets.FIREFOX_API_SECRET }}
        run: npm run submit:firefox
